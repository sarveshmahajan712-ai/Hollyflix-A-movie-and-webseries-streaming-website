<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      body {
            background-color: black;
            margin: 0;
            height: 100%;
            width: 100%;
            height: 100vh;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            animation: holly 15s infinite;
        }

        body {
            background-color: black
        }

        /* Keyframes for multiple images */
        @keyframes holly {
            0% {
                background-image: url(straw.jpg);
            }

            33% {
                background-image: url(john1.JPG);
            }

            66% {
                background-image: url(hollyflixdark.jpg);
            }

            100% {
                background-image: url(hollymulti.JPG);
            }
        }
        </style>
</head>

</html>
